components:
  schemas:
    ChannelPatch:
      properties:
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
        icon:
          anyOf:
          - type: integer
          - type: 'null'
          title: Icon
        color:
          anyOf:
          - type: integer
          - type: 'null'
          title: Color
        fader:
          anyOf:
          - type: number
          - type: 'null'
          title: Fader
        fader_db:
          anyOf:
          - type: number
          - type: 'null'
          title: Fader Db
        'on':
          anyOf:
          - type: boolean
          - type: 'null'
          title: 'On'
        pan:
          anyOf:
          - type: number
          - type: 'null'
          title: Pan
        st:
          anyOf:
          - type: boolean
          - type: 'null'
          title: St
        mono:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Mono
        trim:
          anyOf:
          - type: number
          - type: 'null'
          title: Trim
        phantom:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Phantom
        invert:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Invert
        hpf:
          anyOf:
          - type: number
          - type: 'null'
          title: Hpf
        delay_on:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Delay On
        delay_time:
          anyOf:
          - type: number
          - type: 'null'
          title: Delay Time
        dca:
          anyOf:
          - type: integer
          - type: 'null'
          title: Dca
        mute_grp:
          anyOf:
          - type: integer
          - type: 'null'
          title: Mute Grp
        insert:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Insert
        insert_sel:
          anyOf:
          - type: integer
          - type: 'null'
          title: Insert Sel
      type: object
      title: ChannelPatch
    DynamicsPatch:
      properties:
        'on':
          anyOf:
          - type: boolean
          - type: 'null'
          title: 'On'
        mode:
          anyOf:
          - type: string
          - type: 'null'
          title: Mode
        thr:
          anyOf:
          - type: number
          - type: 'null'
          title: Thr
        ratio:
          anyOf:
          - type: number
          - type: 'null'
          title: Ratio
        attack:
          anyOf:
          - type: number
          - type: 'null'
          title: Attack
        release:
          anyOf:
          - type: number
          - type: 'null'
          title: Release
        knee:
          anyOf:
          - type: number
          - type: 'null'
          title: Knee
        mgain:
          anyOf:
          - type: number
          - type: 'null'
          title: Mgain
      type: object
      title: DynamicsPatch
    EQBandPatch:
      properties:
        type:
          anyOf:
          - type: string
          - type: 'null'
          title: Type
        f:
          anyOf:
          - type: number
          - type: 'null'
          title: F
        g:
          anyOf:
          - type: number
          - type: 'null'
          title: G
        q:
          anyOf:
          - type: number
          - type: 'null'
          title: Q
      type: object
      title: EQBandPatch
    FXParamBody:
      properties:
        value:
          type: number
          title: Value
      type: object
      required:
      - value
      title: FXParamBody
    FXTypeBody:
      properties:
        type:
          type: string
          title: Type
      type: object
      required:
      - type
      title: FXTypeBody
    FaderBody:
      properties:
        fader:
          anyOf:
          - type: number
          - type: 'null'
          title: Fader
        fader_db:
          anyOf:
          - type: number
          - type: 'null'
